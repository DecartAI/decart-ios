name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    release:
        name: Create Release
        runs-on: macos-latest
        env:
            IOS_DEVICE_NAME: "iPhone 16 Pro"
            IOS_OS_VERSION: "latest"

        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Select Xcode
              run: sudo xcode-select -s /Applications/Xcode_26.1.1.app

            - name: Build Hygiene (Reset Package State)
              run: |
                  swift package reset
                  swift build -c debug

            - name: Build Release
              run: |
                  set -o pipefail
                  xcodebuild build \
                    -scheme DecartSDK \
                    -destination "platform=iOS Simulator,name=$IOS_DEVICE_NAME,OS=$IOS_OS_VERSION" \
                    2>&1 | xcbeautify --renderer github-actions

            - name: Extract Version
              id: version
              run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Create Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  body: |
                      Decart iOS SDK ${{ steps.version.outputs.VERSION }}
                  draft: false
                  prerelease: false
