name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    release:
        name: Create Release
        runs-on: macos-latest
        env:
            IOS_DEVICE_NAME: "iPhone 16 Pro"
            IOS_OS_VERSION: "18.5"

        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Select Xcode
              run: sudo xcode-select -s /Applications/Xcode_26.1.app

            - name: Build Release
              uses: brightdigit/swift-build@v1.4.2
              with:
                  build-only: true
                  scheme: DecartSDK
                  type: ios
                  deviceName: ${{ env.IOS_DEVICE_NAME }}
                  osVersion: ${{ env.IOS_OS_VERSION }}
                  download-platform: true
                  xcode: /Applications/Xcode_26.1.app
                  use-xcbeautify: true
                  xcbeautify-renderer: github-actions

            - name: Extract Version
              id: version
              run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Create Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  body: |
                      Decart iOS SDK ${{ steps.version.outputs.VERSION }}
                  draft: false
                  prerelease: false
