name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test (Swift 6.2.1)
    runs-on: macos-latest
    env:
      IOS_DEVICE_NAME: "iPhone 16 Pro"
      IOS_OS_VERSION: "latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app

      - name: Build Hygiene (Reset Package State)
        run: |
          swift package reset
          swift build -c debug

      - name: Build iOS App
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme DecartSDK \
            -destination "platform=iOS Simulator,name=$IOS_DEVICE_NAME,OS=$IOS_OS_VERSION" \
            2>&1 | xcbeautify --renderer github-actions
